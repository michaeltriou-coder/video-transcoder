<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Transcoder</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Video Transcoder</h1>
      <span id="version-badge" class="version-badge"></span>
      <div id="version-tooltip" class="version-tooltip"></div>
    </div>
    <div class="header-actions">
      <button id="models-btn" title="Speech models">Models</button>
      <button id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main>
    <section class="submit-section">
      <h2>Submit Job</h2>
      <form id="job-form">
        <div class="form-group">
          <label for="url">Video URL</label>
          <input type="url" id="url" name="url" placeholder="https://example.com/video.mp4" required>
          <button type="button" id="scan-btn" class="secondary-btn">🔍 Scan page for videos</button>
        </div>
        <div class="form-group checkbox-group">
          <label class="toggle-label">
            <input type="checkbox" id="extract-subtitles" name="extract_subtitles">
            <span>Extract Subtitles</span>
          </label>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="language">Language</label>
            <select id="language" name="language">
              <option value="auto">Auto-detect</option>
              <option value="en">English</option>
              <option value="el">Greek</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
              <option value="ja">Japanese</option>
              <option value="zh">Chinese</option>
              <option value="ar">Arabic</option>
            </select>
          </div>
          <div class="form-group">
            <label for="format">Subtitle Format</label>
            <select id="format" name="format">
              <option value="srt">SRT</option>
              <option value="vtt">VTT</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quality">Video Quality</label>
            <select id="quality" name="quality">
              <option value="best">Best available</option>
              <option value="1080" selected>1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
              <option value="audio">Audio only</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="webhook">Webhook URL <span class="optional">(optional)</span></label>
          <input type="url" id="webhook" name="webhook" placeholder="https://your-app.com/webhook">
        </div>
        <button type="submit" id="submit-btn">Submit Job</button>
      </form>
    </section>

    <section class="jobs-section">
      <div class="jobs-header">
        <h2>Jobs</h2>
        <div class="filter-group">
          <select id="status-filter">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="downloading">Downloading</option>
            <option value="transcribe_pending">Queued (transcribe)</option>
            <option value="transcribing">Transcribing</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
        </div>
      </div>
      <div id="jobs-list"></div>
    </section>
  </main>

  <div id="model-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Speech models">
      <div class="modal-header">
        <h2>Speech Models</h2>
        <button type="button" id="model-modal-close" class="modal-close" title="Close">✕</button>
      </div>
      <div id="model-panel" class="model-panel">
        <div class="model-panel-header">
          <span class="model-panel-title">Speech model</span>
          <span id="model-backend" class="model-backend"></span>
        </div>
        <div id="model-list" class="model-list"></div>
        <div id="model-progress" class="model-progress" hidden>
          <div class="model-progress-label"></div>
          <div class="progress-bar"><div class="progress-bar-fill"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="scan-status" class="scan-status" hidden>
    <span class="spinner"></span>
    <span class="scan-status-text">Scanning page for videos…</span>
  </div>

  <div id="scan-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Videos found on page">
      <div class="modal-header">
        <h2>Videos on Page</h2>
        <button type="button" id="scan-modal-close" class="modal-close" title="Close">✕</button>
      </div>
      <div id="scan-body"></div>
      <div id="scan-footer" class="scan-footer" hidden>
        <label class="scan-selectall">
          <input type="checkbox" id="scan-select-all"> Select all
        </label>
        <button type="button" id="scan-download-btn">Download selected</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
